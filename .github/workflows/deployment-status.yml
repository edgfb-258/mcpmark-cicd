name: Deployment Status Workflow

on:
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write

jobs:
  pre-deployment:
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.create_issue.outputs.result }}
      prev_sha: ${{ steps.get_info.outputs.prev_sha }}
      curr_sha: ${{ steps.get_info.outputs.curr_sha }}
      pkg_version: ${{ steps.get_info.outputs.pkg_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present

      - name: Get Deployment Info
        id: get_info
        run: |
          PREV_SHA=${{ github.event.before }}
          CURR_SHA=${{ github.sha }}
          
          # Handle case where PREV_SHA is all zeros (e.g. initial commit or new branch)
          if [ "$PREV_SHA" == "0000000000000000000000000000000000000000" ]; then
             if git rev-parse HEAD^ >/dev/null 2>&1; then
               PREV_SHA=$(git rev-parse HEAD^)
             else
               PREV_SHA=$CURR_SHA
             fi
          fi
          
          VERSION=$(node -p "require('./package.json').version")
          
          echo "prev_sha=$PREV_SHA" >> $GITHUB_OUTPUT
          echo "curr_sha=$CURR_SHA" >> $GITHUB_OUTPUT
          echo "pkg_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Deployment Tracking Issue
        id: create_issue
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ steps.get_info.outputs.curr_sha }}';
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deployment Tracking - ${sha}`,
              body: `Deployment tracking for commit ${sha}.`,
              labels: ['deployment', 'in-progress']
            });
            return issue.number;

      - name: Comment Pre-deployment Status
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = ${{ steps.create_issue.outputs.result }};
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: 'Pre-deployment checks completed'
            });

  rollback-preparation:
    runs-on: ubuntu-latest
    needs: pre-deployment
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Rollback Artifacts
        id: prep_artifacts
        run: |
          mkdir -p rollback-artifacts
          
          # 1. Executable rollback script
          cat << 'EOF' > rollback-artifacts/rollback.sh
          #!/bin/bash
          set -e
          echo "Starting rollback..."
          # Logic to revert changes would go here
          echo "Rollback completed."
          EOF
          chmod +x rollback-artifacts/rollback.sh
          
          # 2. Configuration backups
          cp package.json rollback-artifacts/package.json.bak
          cp package-lock.json rollback-artifacts/package-lock.json.bak
          
          # 3. Dependency verification script
          cat << 'EOF' > rollback-artifacts/verify-deps.sh
          #!/bin/bash
          echo "Verifying dependencies..."
          npm ls || echo "Dependency issues found"
          EOF
          chmod +x rollback-artifacts/verify-deps.sh
          
          # 4. Detailed rollback documentation
          cat << 'EOF' > rollback-artifacts/ROLLBACK.md
          # Rollback Instructions
          1. Run ./rollback.sh
          2. Restore package.json from backup
          3. Run npm install
          EOF
          
          # 5. Compressed rollback package with SHA256 checksums
          CURR_SHA=${{ needs.pre-deployment.outputs.curr_sha }}
          tar -czf rollback-package-${CURR_SHA}.tar.gz rollback-artifacts/
          sha256sum rollback-package-${CURR_SHA}.tar.gz > rollback-package-${CURR_SHA}.tar.gz.sha256
          
          CHECKSUM=$(cat rollback-package-${CURR_SHA}.tar.gz.sha256 | awk '{print $1}')
          echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT

      - name: Upload Rollback Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rollback-package-${{ needs.pre-deployment.outputs.curr_sha }}
          path: |
            rollback-package-${{ needs.pre-deployment.outputs.curr_sha }}.tar.gz
            rollback-package-${{ needs.pre-deployment.outputs.curr_sha }}.tar.gz.sha256
          retention-days: 30

      - name: Comment Rollback Plan
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = ${{ needs.pre-deployment.outputs.issue_number }};
            const prev_sha = '${{ needs.pre-deployment.outputs.prev_sha }}';
            const curr_sha = '${{ needs.pre-deployment.outputs.curr_sha }}';
            const version = '${{ needs.pre-deployment.outputs.pkg_version }}';
            const checksum = '${{ steps.prep_artifacts.outputs.checksum }}';
            const artifactName = `rollback-package-${curr_sha}`;
            
            const body = `🔄 Rollback Plan Ready
            
            Previous Commit: ${prev_sha}
            Current Commit: ${curr_sha}
            Package Version: ${version}
            Artifact: ${artifactName}
            
            ✅ Executable rollback script
            ✅ Configuration backups
            ✅ Dependency verification script
            ✅ Detailed rollback documentation
            ✅ Compressed rollback package
            
            ### Quick rollback command
            \`\`\`bash
            ./rollback.sh
            \`\`\`
            
            Rollback script created: true
            Configuration backup: true
            SHA256: ${checksum}`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: body
            });

  post-deployment:
    runs-on: ubuntu-latest
    needs: [pre-deployment, rollback-preparation]
    steps:
      - name: Finalize Deployment Issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = ${{ needs.pre-deployment.outputs.issue_number }};
            const curr_sha = '${{ needs.pre-deployment.outputs.curr_sha }}';
            
            // Remove 'in-progress', add 'completed'
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue_number,
                name: 'in-progress'
              });
            } catch (error) {
              console.log('Error removing label (might not exist):', error);
            }
            
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              labels: ['completed']
            });
            
            // Post final comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: `Deployment Completed Successfully`
            });
            
            // Close issue
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              state: 'closed'
            });
